name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: neetcode_redesign/package-lock.json

      - name: Install dependencies
        working-directory: neetcode_redesign
        run: npm ci

      - name: Build Angular app for Pages
        working-directory: neetcode_redesign
        run: npm run build -- --base-href "/${{ github.event.repository.name }}/"

      - name: Prepare Pages artifact
        working-directory: neetcode_redesign
        run: |
          cp dist/neetcode_redesign/browser/index.html dist/neetcode_redesign/browser/404.html
          touch dist/neetcode_redesign/browser/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: neetcode_redesign/dist/neetcode_redesign/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
